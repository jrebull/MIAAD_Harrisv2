services:
  # ---- FastAPI Backend ----
  - type: web
    name: visa-predict-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://visa-predict-mohho.onrender.com
      - key: PYTHON_VERSION
        value: 3.12.0

  # ---- Nuxt Frontend ----
  - type: web
    name: visa-predict-mohho
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: node .output/server/index.mjs
    envVars:
      - key: NUXT_PUBLIC_API_BASE
        value: https://visa-predict-api.onrender.com
      - key: NODE_VERSION
        value: 22
